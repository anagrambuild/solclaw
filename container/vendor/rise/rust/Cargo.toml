[workspace]
members  = ["cli", "ix", "math", "sdk", "types"]
resolver = "2"

[workspace.dependencies]
phoenix-ix         = { path = "../ix" }
phoenix-math-utils = { path = "../math" }
phoenix-types      = { path = "../types" }

base64 = "0.22"
bincode = "1.3"
borsh = { version = "1.5", features = ["derive"] }
bs58 = "0.5"
bytemuck = { version = "1.21", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
fixed = "1.30"
futures-util = "0.3"
parking_lot = "0.12"
pastey = "0.1"
reqwest = { version = "0.12", features = ["json"] }
rust_decimal = { version = "1.39.0", features = ["serde-str"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_with = "3.12"
sha2 = "0.10"
sha2-const-stable = "0.1"
solana-commitment-config = { version = "~2.2" }
solana-instruction = { version = "~2.3", default-features = false, features = [
  "std",
] }
solana-keypair = { version = "~2.2" }
solana-pubkey = { version = "~2.4", features = ["curve25519"] }
solana-rpc-client = "~2.3"
solana-rpc-client-api = "~2.3"
solana-signer = { version = "~2.2" }
solana-transaction = { version = "~2.2" }
thiserror = "2.0"
tokio = { version = "1.44", features = [
  "sync",
  "rt-multi-thread",
  "macros",
  "time",
] }
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }
tracing = { version = "0.1", features = ["log"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2.5"
