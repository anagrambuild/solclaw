# Tiny websocket debug config for `ws_debug_cli`.
#
# Run:
# cargo run -p phoenix-sdk --example ws_debug_cli -- --config sdk/examples/ws_debug_config.toml
# cargo run -p phoenix-sdk --example ws_debug_cli -- --config sdk/examples/ws_debug_config.toml --stats

[connection]
# Optional. If omitted, PHOENIX_WS_URL/PHOENIX_API_URL env defaults are used.
# ws_url = "wss://public-api.phoenix.trade/ws"
# Optional. If omitted, PHOENIX_API_KEY env var is used if present.
# api_key = "your_api_key"

[subscriptions]
all_mids = true

# Symbol lists.
funding_rate = ["SOL"]
orderbook = ["SOL"]
market = ["SOL"]
trades = ["SOL"]

# Candles subscriptions.
[[subscriptions.candles]]
symbol = "SOL"
timeframe = "1m"

# Trader-state subscriptions.
# trader_pda_index is optional (default: 0).
[[subscriptions.trader_state]]
authority = "1imt7zeK3mE17dvdfztuEDhfoCUwnK8RVcjRzxnXLba"
trader_pda_index = 0
