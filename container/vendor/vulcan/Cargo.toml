[workspace]
members  = ["vulcan", "vulcan-lib"]
resolver = "2"

[workspace.dependencies]
vulcan-lib = { path = "vulcan-lib" }

# Rise SDK
phoenix-sdk        = { path = "../rise/rust/sdk" }
phoenix-types      = { path = "../rise/rust/types" }
phoenix-ix         = { path = "../rise/rust/ix" }
phoenix-math-utils = { path = "../rise/rust/math" }

# CLI
clap = { version = "4", features = ["derive"] }

# Async
tokio = { version = "1.44", features = ["rt-multi-thread", "macros", "sync", "time"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# HTTP
reqwest = { version = "0.12", features = ["json"] }

# Solana
solana-sdk = "~2.3"
solana-pubkey = { version = "~2.4", features = ["curve25519"] }
solana-instruction = { version = "~2.3", default-features = false, features = ["std"] }
solana-rpc-client = "~2.3"

# Encryption
aes-gcm = "0.10"
argon2 = "0.5"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }

# Encoding
bs58 = "0.5"
base64 = "0.22"

# Output
comfy-table = "7"
colored = "2"

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Password input
rpassword = "5"

# MCP
rmcp = { version = "1.2", features = ["server", "transport-io"] }
schemars = "1.0"

# Directories
dirs = "5"
